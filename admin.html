<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buram.mn — Бэкофис</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    /* ── Reset & Variables ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --w1: #f2e8da;
      --w2: #e8d8c3;
      --w3: #b8845a;
      --w4: #8f5c30;
      --w5: #5e3410;
      --ink: #1e1208;
      --line: #e6d6c4;
      --sidebar-bg: #1e1208;
      --sidebar-w: 220px;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(30,18,8,.10);
      --success: #4caf7d;
      --error: #c0392b;
      --warning: #e67e22;
      --info: #2980b9;
      font-size: 15px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--w1);
      color: var(--ink);
      min-height: 100vh;
    }

    h1, h2, h3, h4 { font-family: 'Cormorant Garamond', serif; }

    /* ── Login Screen ──────────────────────────────────── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--w1) 0%, var(--w2) 100%);
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(30,18,8,.15);
      border: 1px solid var(--line);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo h1 {
      font-size: 2.2rem;
      color: var(--w5);
      letter-spacing: .02em;
    }

    .login-logo p {
      color: var(--w3);
      font-size: .9rem;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--w4);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--line);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--ink);
      background: var(--w1);
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--w3);
      box-shadow: 0 0 0 3px rgba(184,132,90,.15);
    }

    .form-group textarea { resize: vertical; min-height: 100px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 20px;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s, transform .1s, opacity .2s;
    }

    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .btn-primary {
      background: var(--w4);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--w5); }

    .btn-secondary {
      background: var(--w1);
      color: var(--w4);
      border: 1.5px solid var(--line);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--w2); }

    .btn-danger {
      background: var(--error);
      color: #fff;
    }
    .btn-danger:hover:not(:disabled) { background: #a93226; }

    .btn-success {
      background: var(--success);
      color: #fff;
    }
    .btn-success:hover:not(:disabled) { background: #3da869; }

    .btn-sm {
      padding: 5px 12px;
      font-size: .82rem;
    }

    .btn-full { width: 100%; justify-content: center; }

    #loginError {
      background: #fdf2f2;
      border: 1px solid #f5c6cb;
      color: var(--error);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .88rem;
      margin-bottom: 16px;
      display: none;
    }

    /* ── App Shell ─────────────────────────────────────── */
    #app { display: none; }

    /* ── Sidebar ───────────────────────────────────────── */
    #sidebar {
      position: fixed;
      top: 0; left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      z-index: 100;
      overflow-y: auto;
    }

    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .sidebar-logo h2 {
      color: var(--w2);
      font-size: 1.25rem;
      line-height: 1.2;
    }

    .sidebar-logo span {
      font-family: 'DM Sans', sans-serif;
      font-size: .72rem;
      color: var(--w3);
      letter-spacing: .1em;
      text-transform: uppercase;
      display: block;
      margin-top: 3px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      color: rgba(242,232,218,.65);
      cursor: pointer;
      font-size: .9rem;
      transition: background .15s, color .15s;
      position: relative;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
    }

    .nav-item:hover { background: rgba(255,255,255,.06); color: var(--w1); }

    .nav-item.active {
      background: rgba(184,132,90,.18);
      color: var(--w2);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--w3);
      border-radius: 0 2px 2px 0;
    }

    .nav-emoji { font-size: 1.05rem; width: 22px; text-align: center; }

    .badge {
      margin-left: auto;
      background: var(--w4);
      color: #fff;
      font-size: .7rem;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 99px;
      min-width: 20px;
      text-align: center;
    }

    .badge.hidden { display: none; }

    .sidebar-bottom {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,.08);
    }

    .sidebar-user-email {
      font-size: .78rem;
      color: rgba(242,232,218,.5);
      margin-bottom: 10px;
      word-break: break-all;
    }

    /* ── Main Area ─────────────────────────────────────── */
    #main {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #topbar {
      background: #fff;
      border-bottom: 1px solid var(--line);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    #topbar h2 {
      font-size: 1.4rem;
      color: var(--w5);
    }

    #topbarActions { display: flex; gap: 10px; }

    #pageContent {
      padding: 28px 32px;
      flex: 1;
    }

    /* ── Stat Cards ────────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 22px 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .stat-icon {
      font-size: 2rem;
      width: 52px;
      height: 52px;
      background: var(--w1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stat-info h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--w5);
      line-height: 1;
    }

    .stat-info p {
      font-size: .82rem;
      color: var(--w3);
      margin-top: 4px;
    }

    /* ── Section Card ──────────────────────────────────── */
    .section-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      margin-bottom: 24px;
      overflow: hidden;
    }

    .section-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-header h3 {
      font-size: 1.15rem;
      color: var(--w5);
    }

    /* ── Tables ────────────────────────────────────────── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .9rem;
    }

    .data-table th {
      background: var(--w1);
      color: var(--w4);
      font-weight: 600;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 11px 16px;
      text-align: left;
      border-bottom: 1px solid var(--line);
    }

    .data-table td {
      padding: 11px 16px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }

    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover { background: var(--w1); }

    .table-wrap { overflow-x: auto; }

    /* ── Status Badges ─────────────────────────────────── */
    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .76rem;
      font-weight: 600;
    }

    .status-pending  { background: #fff3cd; color: #856404; }
    .status-confirmed { background: #d1f7e4; color: #1a6640; }
    .status-cancelled { background: #fde8e8; color: #8b1a1a; }
    .status-unread   { background: #e3f0fb; color: #1a4d7a; }
    .status-read     { background: #ececec; color: #555; }
    .status-paid     { background: #d1f7e4; color: #1a6640; }
    .status-free     { background: #f0e8ff; color: #5a2d8a; }
    .status-admin    { background: #fff0d1; color: #7a4000; }
    .status-user     { background: #ececec; color: #555; }
    .status-active   { background: #d1f7e4; color: #1a6640; }
    .status-inactive { background: #fde8e8; color: #8b1a1a; }

    /* ── Toolbar ───────────────────────────────────────── */
    .toolbar {
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar input[type="text"],
    .toolbar select {
      padding: 8px 12px;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      color: var(--ink);
      background: var(--w1);
      outline: none;
      transition: border-color .2s;
    }

    .toolbar input[type="text"]:focus,
    .toolbar select:focus {
      border-color: var(--w3);
    }

    .toolbar input[type="text"] { width: 240px; }

    .toolbar-spacer { flex: 1; }

    /* ── Message Cards ─────────────────────────────────── */
    .msg-list { padding: 8px 0; }

    .msg-card {
      padding: 14px 24px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .msg-card:last-child { border-bottom: none; }
    .msg-card:hover { background: var(--w1); }

    .msg-card.unread { background: #fdf8f4; }

    .msg-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--w3);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1.05rem;
      flex-shrink: 0;
    }

    .msg-body { flex: 1; min-width: 0; }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }

    .msg-name { font-weight: 600; color: var(--ink); font-size: .92rem; }

    .msg-date { font-size: .78rem; color: var(--w3); margin-left: auto; }

    .msg-topic { font-size: .85rem; color: var(--w4); margin-bottom: 2px; }

    .msg-preview {
      font-size: .85rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 520px;
    }

    /* ── Modal ─────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30,18,8,.55);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: #fff;
      border-radius: 14px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 16px 60px rgba(30,18,8,.25);
      transform: translateY(20px);
      transition: transform .2s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal.modal-lg { max-width: 720px; }

    .modal-header {
      padding: 22px 28px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .modal-header h3 { font-size: 1.25rem; color: var(--w5); }

    .modal-close {
      width: 32px; height: 32px;
      border: none; background: var(--w1);
      border-radius: 8px; cursor: pointer;
      font-size: 1.1rem; color: var(--w4);
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }

    .modal-close:hover { background: var(--w2); }

    .modal-body {
      padding: 24px 28px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      padding: 16px 28px;
      border-top: 1px solid var(--line);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .detail-row {
      display: flex;
      gap: 8px;
      margin-bottom: 13px;
      align-items: flex-start;
    }

    .detail-label {
      font-size: .78rem;
      font-weight: 600;
      color: var(--w3);
      text-transform: uppercase;
      letter-spacing: .06em;
      width: 130px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .detail-value { font-size: .92rem; color: var(--ink); flex: 1; }

    /* ── Toast ─────────────────────────────────────────── */
    #toastContainer {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
      pointer-events: all;
      animation: slideIn .25s ease-out;
      max-width: 320px;
    }

    .toast.success { background: var(--success); color: #fff; }
    .toast.error   { background: var(--error);   color: #fff; }
    .toast.info    { background: var(--info);    color: #fff; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(40px); }
    }

    /* ── Spinner ───────────────────────────────────────── */
    .spinner-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--line);
      border-top-color: var(--w3);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Dashboard grid ────────────────────────────────── */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 900px) { .dash-grid { grid-template-columns: 1fr; } }

    /* ── Misc helpers ──────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--w3);
      font-size: .92rem;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
    }

    .checkbox-row input[type="checkbox"] {
      width: 17px; height: 17px;
      accent-color: var(--w4);
      cursor: pointer;
    }

    .actions-cell { display: flex; gap: 6px; flex-wrap: wrap; }

    td.narrow { width: 1%; white-space: nowrap; }
  </style>
</head>
<body>

<!-- ── LOGIN SCREEN ─────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <h1>Buram.mn</h1>
      <p>Администраторын нэвтрэх хэсэг</p>
    </div>
    <div id="loginError"></div>
    <div class="form-group">
      <label>И-мэйл</label>
      <input type="email" id="loginEmail" placeholder="admin@buram.mn" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>Нууц үг</label>
      <div style="position:relative">
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" style="padding-right:42px;width:100%;box-sizing:border-box" />
        <button type="button" onclick="togglePass()" id="togglePassBtn" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#a07850;font-size:16px;padding:0;line-height:1">👁</button>
      </div>
    </div>
    <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">Нэвтрэх</button>
  </div>
</div>

<!-- ── APP ──────────────────────────────────────────── -->
<div id="app">

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sidebar-logo">
      <h2>Buram.mn</h2>
      <span>Бэкофис</span>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item active" onclick="nav('dashboard')" id="nav-dashboard">
        <span class="nav-emoji">📊</span> Хяналтын самбар
      </button>
      <button class="nav-item" onclick="nav('articles')" id="nav-articles">
        <span class="nav-emoji">📝</span> Нийтлэлүүд
      </button>
      <button class="nav-item" onclick="nav('appointments')" id="nav-appointments">
        <span class="nav-emoji">📅</span> Цаг захиалгууд
        <span class="badge hidden" id="badge-appointments">0</span>
      </button>
      <button class="nav-item" onclick="nav('messages')" id="nav-messages">
        <span class="nav-emoji">💌</span> Захиааны ирсэн
        <span class="badge hidden" id="badge-messages">0</span>
      </button>
      <button class="nav-item" onclick="nav('subscribers')" id="nav-subscribers">
        <span class="nav-emoji">📬</span> Захиалагчид
      </button>
      <button class="nav-item" onclick="nav('users')" id="nav-users">
        <span class="nav-emoji">👥</span> Хэрэглэгчид
      </button>
    </div>
    <div class="sidebar-bottom">
      <div class="sidebar-user-email" id="sidebarEmail">—</div>
      <button class="btn btn-secondary btn-full btn-sm" onclick="doLogout()">Гарах</button>
    </div>
  </nav>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <h2 id="pageTitle">Хяналтын самбар</h2>
      <div id="topbarActions"></div>
    </div>
    <div id="pageContent">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<!-- ── TOAST CONTAINER ──────────────────────────────── -->
<div id="toastContainer"></div>

<!-- ── MODAL OVERLAY ────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <h3 id="modalTitle">Цонх</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- ── SCRIPT ────────────────────────────────────────── -->

/* =====================================================
   HELPERS
   ===================================================== */
function fmtDate(val) {
  if (!val) return '—';
  let d;
  if (val && val.toDate) d = val.toDate();
  else if (val && val.seconds) d = new Date(val.seconds * 1000);
  else d = new Date(val);
  if (isNaN(d)) return '—';
  return d.toLocaleDateString('mn-MN', { year:'numeric', month:'2-digit', day:'2-digit' })
    + ' ' + d.toLocaleTimeString('mn-MN', { hour:'2-digit', minute:'2-digit' });
}

const STATUS_LABELS = {
  pending:   'Хүлээгдэж буй',
  confirmed: 'Баталгаажсан',
  cancelled: 'Цуцлагдсан',
  unread:    'Уншаагүй',
  read:      'Уншсан',
  admin:     'Админ',
  user:      'Хэрэглэгч',
  active:    'Идэвхтэй',
  inactive:  'Идэвхгүй'
};

function statusLabel(key) {
  return STATUS_LABELS[key] || key || '—';
}

function statusBadge(key) {
  return `<span class="status-badge status-${key}">${statusLabel(key)}</span>`;
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function filterTable(inputId, tableId) {
  const q = document.getElementById(inputId).value.toLowerCase();
  const rows = document.querySelectorAll('#' + tableId + ' tbody tr');
  rows.forEach(r => {
    r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

/* =====================================================
   TOAST
   ===================================================== */
function toast(msg, type = 'info') {
  const wrap = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  const icons = { success:'✓', error:'✕', info:'ℹ' };
  el.innerHTML = `<span>${icons[type] || 'ℹ'}</span><span>${esc(msg)}</span>`;
  wrap.appendChild(el);
  setTimeout(() => {
    el.style.animation = 'fadeOut .3s forwards';
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

function showLoginError(msg) {

  el.textContent = msg;

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  const btn   = document.getElementById('loginBtn');
  document.getElementById('loginError').style.display = 'none';

  if (!email || !pass) { showLoginError('И-мэйл болон нууц үгээ оруулна уу.'); return; }

  btn.disabled = true;
  btn.textContent = 'Нэвтэрч байна...';

  try {
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    const SUPER_ADMIN = 'buramhan9910@gmail.com';
    const isSuperAdmin = cred.user.email === SUPER_ADMIN;
    // Superadmin: auto-write role if missing
    if (isSuperAdmin) {
      await db.collection('users').doc(cred.user.uid).set({ role: 'admin', email: cred.user.email }, { merge: true });
    } else {
      // Check admin role for other users
      const snap = await db.collection('users').doc(cred.user.uid).get();
      if (!snap.exists || snap.data().role !== 'admin') {
        await auth.signOut();
        showLoginError('Танд энэ хэсэгт нэвтрэх эрх байхгүй байна.');
        return;
      }
    }
  } catch (e) {
    const errs = {
      'auth/user-not-found': 'Бүртгэлтэй хэрэглэгч олдсонгүй.',
      'auth/wrong-password': 'Нууц үг буруу байна.',
      'auth/invalid-email': 'И-мэйл хаяг буруу форматтай байна.',
      'auth/too-many-requests': 'Хэт олон оролдлого. Түр хүлээнэ үү.',
      'auth/invalid-credential': 'И-мэйл эсвэл нууц үг буруу байна.',
    };
    showLoginError(errs[e.code] || 'Алдаа гарлаа: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Нэвтрэх';
  }
}

document.getElementById('loginPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function saveArticle(id) {
  const data = {
    title:    document.getElementById('af-title').value.trim(),
    category: document.getElementById('af-category').value.trim(),
    chapter:  document.getElementById('af-chapter').value.trim(),
    excerpt:  document.getElementById('af-excerpt').value.trim(),
    content:  document.getElementById('af-content').value.trim(),
    readTime: parseInt(document.getElementById('af-readTime').value) || 0,
    isPaid:   document.getElementById('af-isPaid').checked,
  };

  if (!data.title) { toast('Гарчиг оруулна уу.', 'error'); return; }

  try {
    if (id) {
      await db.collection('articles').doc(id).update({ ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      toast('Нийтлэл шинэчлэгдлээ.', 'success');
    } else {
      await db.collection('articles').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      toast('Нийтлэл нэмэгдлээ.', 'success');
    }
    closeModal();
    articles();
  } catch (e) {

          <option value="">Бүх захиа</option>
          <option value="unread">Уншаагүй</option>
          <option value="read">Уншсан</option>
        </select>
      </div>
      <div class="msg-list" id="msgList">
        ${renderMsgCards(messagesData)}
      </div>
    </div>
  `;
}

function renderMsgCards(arr) {
  if (!arr.length) return '<div class="empty-state">Захиа байхгүй байна</div>';
  return arr.map(m => {
    const initial = (m.name || '?')[0].toUpperCase();
    return `<div class="msg-card ${m.status === 'unread' ? 'unread' : ''}" onclick="viewMessage('${m.id}')">
      <div class="msg-avatar">${esc(initial)}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-name">${esc(m.name || '—')}</span>
          ${statusBadge(m.status || 'unread')}
          <span class="msg-date">${fmtDate(m.createdAt)}</span>
        </div>
        <div class="msg-topic">${esc(m.topic || '—')}</div>
        <div class="msg-preview">${esc(m.message || '')}</div>
      </div>
    </div>`;
  }).join('');
}

function filterMessages() {
  const q = (document.getElementById('msgSearch')?.value || '').toLowerCase();
  const f = document.getElementById('msgFilter')?.value || '';
  const filtered = messagesData.filter(m => {
    const txt = (m.name + m.topic + m.message + m.email).toLowerCase();
    const matchQ = txt.includes(q);
    const matchF = !f || m.status === f;
    return matchQ && matchF;
  });
  const list = document.getElementById('msgList');
  if (list) list.innerHTML = renderMsgCards(filtered);
}

async function viewMessage(id) {
  const m = messagesData.find(x => x.id === id);
  if (!m) return;

  // Mark as read
  if (m.status === 'unread') {
    try {
      await db.collection('messages').doc(id).update({ status: 'read' });
      m.status = 'read';
    } catch (e) { /* silent */ }
  }

  const body = `
    <div class="detail-row"><span class="detail-label">Нэр</span><span class="detail-value">${esc(m.name)}</span></div>
    <div class="detail-row"><span class="detail-label">И-мэйл</span><span class="detail-value">${esc(m.email || '—')}</span></div>
    <div class="detail-row"><span class="detail-label">Сэдэв</span><span class="detail-value">${esc(m.topic || '—')}</span></div>
    <div class="detail-row"><span class="detail-label">Огноо</span><span class="detail-value">${fmtDate(m.createdAt)}</span></div>
    <div class="detail-row"><span class="detail-label">Төлөв</span><span class="detail-value">${statusBadge('read')}</span></div>
    <hr style="border:none;border-top:1px solid var(--line);margin:16px 0"/>
    <p style="font-size:.95rem;line-height:1.7;color:var(--ink);white-space:pre-wrap">${esc(m.message || '')}</p>
  `;
  const footer = `
    <button class="btn btn-danger" onclick="deleteMessage('${id}')">🗑 Устгах</button>
    <button class="btn btn-secondary" onclick="closeModal()">Хаах</button>
  `;
  openModal('Захиааны дэлгэрэнгүй', body, footer, true);
  renderMessagesPage();
}

async function deleteMessage(id) {
  try {
    await db.collection('messages').doc(id).delete();
    messagesData = messagesData.filter(x => x.id !== id);
    toast('Захиа устгагдлаа.', 'success');
    closeModal();
    renderMessagesPage();
  } catch (e) {
    toast('Алдаа: ' + e.message, 'error');
  }
}

/* =====================================================
   PAGE: SUBSCRIBERS
   ===================================================== */
let subscribersData = [];

async function subscribers() {
  document.getElementById('topbarActions').innerHTML = `
    <button class="btn btn-secondary" onclick="exportSubscribersCSV()">⬇ CSV татах</button>
  `;

  const snap = await db.collection('subscribers').orderBy('subscribedAt','desc').get();
  subscribersData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderSubscribersPage();
}

function renderSubscribersPage() {
  const pc = document.getElementById('pageContent');
  pc.innerHTML = `
    <div class="section-card">
      <div class="section-header">
        <h3>Нийт захиалагч: ${subscribersData.length}</h3>
      </div>
      <div class="toolbar">
        <input type="text" id="subSearch" placeholder="Хайх..." oninput="filterTable('subSearch','subTable')" />
      </div>
      <div class="table-wrap">
        <table class="data-table" id="subTable">
          <thead><tr>
            <th>#</th><th>И-мэйл</th><th>Бүртгүүлсэн огноо</th><th>Үйлдэл</th>
          </tr></thead>
          <tbody>
            ${subscribersData.length === 0 ? `<tr><td colspan="4"><div class="empty-state">Захиалагч байхгүй байна</div></td></tr>` :
              subscribersData.map((s, i) => `
                <tr>
                  <td>${i + 1}</td>
                  <td>${esc(s.email || '—')}</td>
                  <td>${fmtDate(s.subscribedAt || s.createdAt)}</td>
                  <td class="narrow">
                    <button class="btn btn-danger btn-sm" onclick="deleteSubscriber('${s.id}')">🗑</button>
                  </td>
                </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

async function deleteSubscriber(id) {
  openModal('Устгах', '<p style="font-size:.95rem;color:var(--ink)">Энэ захиалагчийг устгах уу?</p>',
    `<button class="btn btn-secondary" onclick="closeModal()">Болих</button>
     <button class="btn btn-danger" onclick="confirmDeleteSubscriber('${id}')">Устгах</button>`);
}

async function confirmDeleteSubscriber(id) {
  try {
    await db.collection('subscribers').doc(id).delete();
    subscribersData = subscribersData.filter(x => x.id !== id);
    toast('Захиалагч устгагдлаа.', 'success');
    closeModal();
    renderSubscribersPage();
  } catch (e) {
    toast('Алдаа: ' + e.message, 'error');
  }
}

function exportSubscribersCSV() {
  if (!subscribersData.length) { toast('Экспортлох өгөгдөл байхгүй.', 'error'); return; }
  const rows = [['#', 'И-мэйл', 'Огноо']];
  subscribersData.forEach((s, i) => {
    rows.push([i + 1, s.email || '', fmtDate(s.subscribedAt || s.createdAt)]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'subscribers_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV татагдлаа.', 'success');
}

/* =====================================================
   PAGE: USERS
   ===================================================== */
let usersData = [];

async function users() {
  const snap = await db.collection('users').orderBy('createdAt','desc').get();
  usersData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderUsersPage();
}

function renderUsersPage() {
  const pc = document.getElementById('pageContent');
  pc.innerHTML = `
    <div class="section-card">
      <div class="toolbar">
        <input type="text" id="userSearch" placeholder="Хайх..." oninput="filterTable('userSearch','userTable')" />
      </div>
      <div class="table-wrap">
        <table class="data-table" id="userTable">
          <thead><tr>
            <th>И-мэйл</th><th>Нэр</th><th>Дүр</th><th>Захиалга</th><th>Огноо</th><th>Үйлдэл</th>
          </tr></thead>
          <tbody>
            ${usersData.length === 0 ? `<tr><td colspan="6"><div class="empty-state">Хэрэглэгч байхгүй байна</div></td></tr>` :
              usersData.map(u => `
                <tr>
                  <td>${esc(u.email || '—')}</td>
                  <td>${esc(u.displayName || '—')}</td>
                  <td>${statusBadge(u.role || 'user')}</td>
                  <td>${statusBadge(u.subscribed ? 'active' : 'inactive')}</td>
                  <td>${fmtDate(u.createdAt)}</td>
                  <td class="narrow">
                    ${u.role !== 'admin' ? `<button class="btn btn-secondary btn-sm" onclick="makeAdmin('${u.id}')">Админ болгох</button>` : ''}
                  </td>
                </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

async function makeAdmin(id) {
  openModal('Батлах', '<p style="font-size:.95rem;color:var(--ink)">Энэ хэрэглэгчийг админ болгох уу?</p>',
    `<button class="btn btn-secondary" onclick="closeModal()">Болих</button>
     <button class="btn btn-primary" onclick="confirmMakeAdmin('${id}')">Тийм</button>`);
}

async function confirmMakeAdmin(id) {
  try {
    await db.collection('users').doc(id).update({ role: 'admin' });
    const u = usersData.find(x => x.id === id);
    if (u) u.role = 'admin';
    toast('Хэрэглэгч админ болгогдлоо.', 'success');
    closeModal();
    renderUsersPage();
  } catch (e) {
    toast('Алдаа: ' + e.message, 'error');
  }
}
</script>
</body>
</html>
